[pytest]
# Auto-detect ``async def`` tests so we don't have to decorate each one.
# Required by tests in tests/test_ambassador_b2b_split.py and any future
# async test file that talks to Motor / async services directly.
asyncio_mode = auto

# Use ONE shared event loop for the whole session so Motor's client (which
# binds to the loop on first use) stays valid across tests. Without this
# pytest-asyncio gives each test a fresh loop → Motor explodes with
# "Event loop is closed" on the second test.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Don't show the deprecation noise from third-party plugins on every run.
filterwarnings =
    ignore::DeprecationWarning:dateutil.*
    ignore::DeprecationWarning:bson.*
